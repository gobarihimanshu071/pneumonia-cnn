apiVersion: apps/v1

kind: Deployment

metadata:
  name: pneumonia-app-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: pneumonia-app

  template:

    metadata:
      labels:
        app: pneumonia-app

    spec:

      containers:

      - name: pneumonia-container

        image: localhost/pneumonia-app:latest


        ports:

        - containerPort: 5000